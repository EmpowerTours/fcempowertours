# yaml-language-server: $schema=./node_modules/envio/evm.schema.json
name: empowertours-envio
description: EmpowerTours NFT Indexer for Monad - Music, Passports & Itineraries + DeFi
networks:
  - id: 10143
    start_block: 50000000  # ✅ Updated to recent block for faster indexing
    contracts:
      - name: EmpowerToursNFT
        address:
          - "0xAD403897CD7d465445aF0BD4fe40f18698655D4e"  # ✅ V7: EmpowerToursNFTv7 - Music + Art NFTs with delegated burning (Nov 21, 2025)
        handler: src/EventHandlers.ts
        events:
          # Master NFT minting
          - event: "MasterMinted(uint256 indexed tokenId, address indexed artist, string tokenURI, uint256 price, uint8 nftType)"
            field_selection:
              transaction_fields:
                - hash

          # ✅ License purchase with expiry tracking
          - event: "LicensePurchased(uint256 indexed licenseId, uint256 indexed masterTokenId, address indexed buyer, uint256 expiry)"
            field_selection:
              transaction_fields:
                - hash

          # ✅ License expiration tracking
          - event: "LicenseExpired(uint256 indexed licenseId)"
            field_selection:
              transaction_fields:
                - hash

          # Royalty tracking
          - event: "RoyaltyPaid(uint256 indexed tokenId, address indexed recipient, uint256 amount)"
            field_selection:
              transaction_fields:
                - hash

          # Price updates
          - event: "PriceUpdated(uint256 indexed masterTokenId, uint256 newPrice)"
            field_selection:
              transaction_fields:
                - hash

          # NFT transfer tracking
          - event: "Transfer(address indexed from, address indexed to, uint256 indexed tokenId)"
            field_selection:
              transaction_fields:
                - hash

          # ✅ V5: Staking events
          - event: "NFTStaked(uint256 indexed tokenId, address indexed staker, uint256 timestamp)"
            field_selection:
              transaction_fields:
                - hash

          - event: "NFTUnstaked(uint256 indexed tokenId, address indexed staker, uint256 rewardsClaimed, uint256 timestamp)"
            field_selection:
              transaction_fields:
                - hash

          - event: "RewardsClaimed(uint256 indexed tokenId, address indexed staker, uint256 amount, uint256 timestamp)"
            field_selection:
              transaction_fields:
                - hash

          # ✅ V5: Burning events
          - event: "NFTBurned(uint256 indexed tokenId, address indexed burner, uint256 rewardReceived, uint256 timestamp)"
            field_selection:
              transaction_fields:
                - hash

          - event: "BurnRewardUpdated(uint256 newReward, uint256 timestamp)"
            field_selection:
              transaction_fields:
                - hash

          - event: "RewardRateUpdated(uint256 newRate, uint256 timestamp)"
            field_selection:
              transaction_fields:
                - hash

      - name: PassportNFT
        address:
          - "0x820A9cc395D4349e19dB18BAc5Be7b3C71ac5163"  # ✅ PassportNFTv3 with V9 staking + itinerary stamps
        handler: src/EventHandlers.ts
        events:
          # Passport minting with country data
          - event: "PassportMinted(uint256 indexed tokenId, address indexed owner, string countryCode, string countryName, string region, string continent)"
            field_selection:
              transaction_fields:
                - hash

          # ✅ Passport staking with NFT
          - event: "PassportStaked(uint256 indexed tokenId, uint256 amount, uint256 positionId)"
            field_selection:
              transaction_fields:
                - hash

          # ✅ Venue stamps (event attendance)
          - event: "VenueStampAdded(uint256 indexed tokenId, string location, string eventType, uint256 timestamp)"
            field_selection:
              transaction_fields:
                - hash

          # NFT transfer tracking
          - event: "Transfer(address indexed from, address indexed to, uint256 indexed tokenId)"
            field_selection:
              transaction_fields:
                - hash

      # ✅ ExperienceNFT Contract (Deployed Dec 8, 2025)
      - name: ExperienceNFT
        address:
          - "0xDcBBA5460a6043656331aB0399F68C52f76463D3"
        handler: src/EventHandlers.ts
        events:
          # NFT Minting
          - event: "Transfer(address indexed from, address indexed to, uint256 indexed tokenId)"
            field_selection:
              transaction_fields:
                - hash

          # Experience creation (GPS-gated travel experiences)
          - event: "ExperienceCreated(uint256 indexed experienceId, address indexed creator, string title, string city, string country, uint256 price)"
            field_selection:
              transaction_fields:
                - hash

          # Experience purchase (reveals GPS location)
          - event: "ExperiencePurchased(uint256 indexed experienceId, address indexed buyer, uint256 price)"
            field_selection:
              transaction_fields:
                - hash

          # Experience completion (photo proof + GPS verification)
          - event: "ExperienceCompleted(uint256 indexed experienceId, address indexed user, string photoProofHash, uint256 rewardAmount)"
            field_selection:
              transaction_fields:
                - hash

          # Transportation request (triggers ServiceMarketplace ride booking)
          - event: "TransportationRequested(uint256 indexed experienceId, address indexed user, int256 fromLat, int256 fromLon, int256 toLat, int256 toLon)"
            field_selection:
              transaction_fields:
                - hash

      # ✅ V9: YieldStrategy Contract (NFT-gated staking with MON deposits - Two-step unstaking)
      - name: YieldStrategy
        address:
          - "0x37aC86916Ae673bDFCc9c712057092E57b270f5f"  # V9 deployed - Fixed Kintsu unstaking with cooldown
        handler: src/EventHandlers.ts
        events:
          - event: "Initialized(address indexed toursToken, address indexed kintsu, address indexed tokenSwap, address dragonRouter, address keeper)"
            field_selection:
              transaction_fields:
                - hash
          - event: "NFTWhitelisted(address indexed nftAddress, bool accepted)"
            field_selection:
              transaction_fields:
                - hash
          - event: "StakingPositionCreated(uint256 indexed positionId, address indexed nftAddress, uint256 indexed nftTokenId, address owner, address beneficiary, uint256 monAmount, uint256 timestamp)"
            field_selection:
              transaction_fields:
                - hash
          - event: "StakingPositionClosed(uint256 indexed positionId, address indexed user, uint256 monStaked, uint256 yieldShare, uint256 timestamp)"
            field_selection:
              transaction_fields:
                - hash
          - event: "YieldHarvested(uint256 yieldMonAmount, uint256 yieldToursAmount, uint256 totalAssets, uint256 timestamp)"
            field_selection:
              transaction_fields:
                - hash

      # ✅ NEW: DemandSignalEngine Contract
      - name: DemandSignalEngine
        address:
          - "0xC2Eb75ddf31cd481765D550A91C5A63363B36817"
        handler: src/EventHandlers.ts
        events:
          - event: "DemandSubmitted(address indexed user, uint256 indexed eventId, uint256 amount)"
            field_selection:
              transaction_fields:
                - hash
          - event: "DemandWithdrawn(address indexed user, uint256 indexed eventId, uint256 amount)"
            field_selection:
              transaction_fields:
                - hash

      # ✅ NEW: SmartEventManifest Contract
      - name: SmartEventManifest
        address:
          - "0x5cfe8379058cA460aA60ef15051Be57dab4A651C"
        handler: src/EventHandlers.ts
        events:
          - event: "EventCreated(uint256 indexed eventId, string name, string location, uint256 startDate)"
            field_selection:
              transaction_fields:
                - hash
          - event: "TicketPurchased(uint256 indexed eventId, address indexed buyer, uint256 quantity)"
            field_selection:
              transaction_fields:
                - hash
          - event: "EventCancelled(uint256 indexed eventId)"
            field_selection:
              transaction_fields:
                - hash

      # ✅ NEW: TandaYieldGroup Contract
      - name: TandaYieldGroup
        address:
          - "0xE0983Cd98f5852AD6BF56648B4724979B75E9fC8"
        handler: src/EventHandlers.ts
        events:
          - event: "GroupCreated(uint256 indexed groupId, address indexed creator, string name)"
            field_selection:
              transaction_fields:
                - hash
          - event: "MemberJoined(uint256 indexed groupId, address indexed member)"
            field_selection:
              transaction_fields:
                - hash
          - event: "ContributionMade(uint256 indexed groupId, address indexed member, uint256 amount)"
            field_selection:
              transaction_fields:
                - hash
          - event: "PayoutClaimed(uint256 indexed groupId, address indexed member, uint256 amount)"
            field_selection:
              transaction_fields:
                - hash

      # ✅ NEW: CreditScoreCalculator Contract
      - name: CreditScoreCalculator
        address:
          - "0x9598397899CCcf9d0CFbDB40dEf1EF34e550c0c5"
        handler: src/EventHandlers.ts
        events:
          - event: "ScoreUpdated(address indexed user, uint256 oldScore, uint256 newScore)"
            field_selection:
              transaction_fields:
                - hash
          - event: "PaymentRecorded(address indexed user, uint256 amount, bool onTime)"
            field_selection:
              transaction_fields:
                - hash

      # ✅ MusicBeatMatchV2 Contract (Deployed Dec 8, 2025 - Daily music challenges with delegation)
      - name: MusicBeatMatchV2
        address:
          - "0x913E65B7742Da72972fB821468215E89F085F178"
        handler: src/EventHandlers.ts
        events:
          - event: "ChallengeCreated(uint256 indexed challengeId, uint256 artistId, string artistName, string songTitle, string hint, uint256 rewardTours, uint256 rewardWmon)"
            field_selection:
              transaction_fields:
                - hash
          - event: "GuessSubmitted(uint256 indexed challengeId, address indexed player, uint256 guessedArtistId, string guessedSongTitle, bool correct, uint256 rewardEarned)"
            field_selection:
              transaction_fields:
                - hash
          - event: "StreakAchieved(address indexed player, uint256 streakDays, uint256 bonusReward)"
            field_selection:
              transaction_fields:
                - hash
          - event: "RewardsDistributed(uint256 indexed challengeId, uint256 totalWinners, uint256 totalRewards)"
            field_selection:
              transaction_fields:
                - hash

      # ✅ CountryCollectorV2 Contract (Deployed Dec 8, 2025 - Weekly country/artist challenges)
      - name: CountryCollectorV2
        address:
          - "0xC7FfA579f66f6A3142b3e27427b04124F4b3cd61"
        handler: src/EventHandlers.ts
        events:
          - event: "ChallengeCreated(uint256 indexed weekId, string countryCode, string countryName, string continent)"
            field_selection:
              transaction_fields:
                - hash
          - event: "ArtistCompleted(uint256 indexed weekId, address indexed player, uint256 artistIndex, uint256 artistId, string artistName)"
            field_selection:
              transaction_fields:
                - hash
          - event: "BadgeEarned(address indexed player, uint256 indexed weekId, uint256 artistsCompleted, uint256 rewardEarned)"
            field_selection:
              transaction_fields:
                - hash
          - event: "GlobalCitizenAchieved(address indexed player, uint256 totalCountries, uint256 bonusReward)"
            field_selection:
              transaction_fields:
                - hash

      # ✅ PersonalAssistantV1 Contract (Deployed Dec 8, 2025 - Verified personal concierge system)
      - name: PersonalAssistantV1
        address:
          - "0xa4c15Eb48EfB739Ea6D4efBF53180cdF86c807f4"
        handler: src/EventHandlers.ts
        events:
          - event: "AssistantRegistered(address indexed assistant, string name, string bio, string[] languages)"
            field_selection:
              transaction_fields:
                - hash
          - event: "AssistantVerified(address indexed assistant, uint8 newPath)"
            field_selection:
              transaction_fields:
                - hash
          - event: "AssistantAssigned(address indexed traveler, address indexed assistant)"
            field_selection:
              transaction_fields:
                - hash
          - event: "ServiceRequestCreated(uint256 indexed requestId, address indexed traveler, address indexed assistant, string serviceType, uint256 estimatedBudget)"
            field_selection:
              transaction_fields:
                - hash
          - event: "ServiceQuoted(uint256 indexed requestId, uint256 quotedPrice)"
            field_selection:
              transaction_fields:
                - hash
          - event: "ServiceAccepted(uint256 indexed requestId, uint256 escrowAmount)"
            field_selection:
              transaction_fields:
                - hash
          - event: "ServiceCompleted(uint256 indexed requestId)"
            field_selection:
              transaction_fields:
                - hash
          - event: "ServiceConfirmed(uint256 indexed requestId, uint256 rating, uint256 assistantPayout, uint256 platformFee)"
            field_selection:
              transaction_fields:
                - hash
          - event: "DisputeRaised(uint256 indexed requestId, address indexed raiser)"
            field_selection:
              transaction_fields:
                - hash

      # ✅ ServiceMarketplace Contract (Deployed Dec 8, 2025 - Food delivery & ride sharing)
      - name: ServiceMarketplace
        address:
          - "0xa576aB68b630F68F6D7E09fCc888ddA80dfc8ee4"
        handler: src/EventHandlers.ts
        events:
          - event: "FoodProviderRegistered(address indexed provider, string businessName)"
            field_selection:
              transaction_fields:
                - hash
          - event: "RideProviderRegistered(address indexed driver, string driverName)"
            field_selection:
              transaction_fields:
                - hash
          - event: "MenuItemAdded(address indexed provider, uint256 itemId, string name, uint256 price)"
            field_selection:
              transaction_fields:
                - hash
          - event: "FoodOrderCreated(uint256 indexed orderId, address indexed customer, address indexed provider, uint256 totalAmount)"
            field_selection:
              transaction_fields:
                - hash
          - event: "DeliveryAccepted(uint256 indexed orderId, address indexed driver)"
            field_selection:
              transaction_fields:
                - hash
          - event: "FoodOrderStatusUpdated(uint256 indexed orderId, uint8 status, string locationHash)"
            field_selection:
              transaction_fields:
                - hash
          - event: "FoodOrderCompleted(uint256 indexed orderId, address indexed provider, uint256 providerAmount, address indexed driver, uint256 driverAmount)"
            field_selection:
              transaction_fields:
                - hash
          - event: "RideRequestCreated(uint256 indexed requestId, address indexed passenger, uint256 agreedPrice)"
            field_selection:
              transaction_fields:
                - hash
          - event: "RideRequestAccepted(uint256 indexed requestId, address indexed driver)"
            field_selection:
              transaction_fields:
                - hash
          - event: "RideStatusUpdated(uint256 indexed requestId, uint8 status, string locationHash)"
            field_selection:
              transaction_fields:
                - hash
          - event: "RideCompleted(uint256 indexed requestId, address indexed driver, uint256 amount)"
            field_selection:
              transaction_fields:
                - hash
          - event: "DisputeRaised(uint8 serviceType, uint256 indexed id, address indexed raiser)"
            field_selection:
              transaction_fields:
                - hash
          - event: "RatingSubmitted(address indexed provider, uint256 rating, address indexed rater)"
            field_selection:
              transaction_fields:
                - hash
          - event: "NoShowCompensationClaimed(uint8 serviceType, uint256 indexed id, address indexed claimer, uint256 compensation, string proofHash)"
            field_selection:
              transaction_fields:
                - hash

      # ✅ DailyPassLotteryV2 Contract (Redeployed Dec 8, 2025 - Delegation support for claim + dual fees)
      - name: DailyPassLottery
        address:
          - "0x89345c2b05446F278b7e5746814feF368D764403"
        handler: src/EventHandlers.ts
        events:
          # Daily pass purchase (MON or shMON) - with beneficiary and payer
          - event: "DailyPassPurchased(uint256 indexed roundId, address indexed beneficiary, address indexed payer, uint256 entryIndex, bool paidWithShMon, uint256 amount)"
            field_selection:
              transaction_fields:
                - hash

          # Randomness committed (round ended, commit phase)
          - event: "RandomnessCommitted(uint256 indexed roundId, uint256 commitBlock, bytes32 commitHash, address indexed caller, uint256 reward)"
            field_selection:
              transaction_fields:
                - hash

          # Winner revealed (final randomness) - with caller and reward
          - event: "WinnerRevealed(uint256 indexed roundId, address indexed winner, uint256 winnerIndex, uint256 monPrize, uint256 shMonPrize, address indexed caller, uint256 reward)"
            field_selection:
              transaction_fields:
                - hash

          # Prize claimed from escrow
          - event: "PrizeClaimed(uint256 indexed roundId, address indexed winner, uint256 monAmount, uint256 shMonAmount)"
            field_selection:
              transaction_fields:
                - hash

          # Escrow expired (unclaimed prize returned to platform)
          - event: "EscrowExpired(uint256 indexed roundId)"
            field_selection:
              transaction_fields:
                - hash

          # New round started
          - event: "RoundStarted(uint256 indexed roundId, uint256 startTime, uint256 endTime)"
            field_selection:
              transaction_fields:
                - hash

rollback_on_reorg: false
