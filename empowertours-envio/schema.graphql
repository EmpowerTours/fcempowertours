# ✅ NEW: SmartEventManifest Entities
type SmartEvent @entity {
  id: ID!
  eventId: String!
  name: String!
  location: String!
  startDate: BigInt!
  endDate: BigInt
  capacity: BigInt!
  ticketsSold: Int!
  price: BigInt!
  active: Boolean!
  cancelled: Boolean!
  createdAt: Timestamp!
  blockNumber: BigInt!
  txHash: String!
